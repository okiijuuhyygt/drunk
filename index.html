<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>又要等到你喝醉之後才能說愛你 — 陳則皞</title>
<meta property="og:title" content="又要等到你喝醉之後才能說愛你 — 陳則皞">
<meta property="og:description" content="這次，我把它重新做了一遍。各平台串流上線。">
<meta property="og:image" content="cover.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ===== 巷弄皮(GameBoy/像素・羊皮紙+黃銅)— 換皮改這區 ===== */
  :root{
    --paper:#f3ead4; --paper-soft:#ede2c4; --paper-edge:#c9b88c;
    --ink:#2a1f12; --ink-soft:#5e4a30; --ink-mute:#8a7556;
    --brass:#b8801f; --brass-light:#d4a13a; --brass-deep:#6e4d10;
    --shadow:#2a1f12;
    --px:4px;
    --pixel-en:"Press Start 2P",monospace;
    --mono:"VT323","Courier New",monospace;
    --sans:"Noto Sans TC","PingFang TC",sans-serif;
  }
  /* ===================================================== */
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:var(--sans);color:var(--ink);background:var(--paper);
    background-image:repeating-linear-gradient(0deg,rgba(42,31,18,.022) 0 1px,transparent 1px 3px);
    min-height:100vh;display:flex;justify-content:center;padding:34px 20px 56px;line-height:1.55;
  }
  .wrap{width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;}
  /* 像素邊框面板 */
  .panel{
    width:100%;background:var(--paper-soft);padding:26px 22px 24px;
    box-shadow:0 0 0 var(--px) var(--ink), var(--px) var(--px) 0 var(--px) var(--brass-deep);
    display:flex;flex-direction:column;align-items:center;
  }
  .badge{
    font-family:var(--pixel-en);font-size:.5rem;color:var(--paper);background:var(--brass);
    padding:6px 9px;letter-spacing:1px;box-shadow:var(--px) var(--px) 0 0 var(--brass-deep);
  }
  .cover{
    width:72%;max-width:280px;aspect-ratio:9/16;object-fit:cover;margin-top:20px;
    image-rendering:auto;
    box-shadow:0 0 0 var(--px) var(--ink), 0 0 0 calc(var(--px)*2) var(--brass-light);
  }
  h1{font-size:1.28rem;font-weight:700;margin-top:22px;text-align:center;color:var(--ink);}
  .artist{font-family:var(--mono);font-size:1.35rem;color:var(--brass-deep);margin-top:4px;letter-spacing:3px;}
  .tag{color:var(--ink-soft);font-size:.86rem;margin-top:12px;text-align:center;max-width:280px;}
  .links{width:100%;margin-top:24px;display:flex;flex-direction:column;gap:11px;}
  a.btn{
    display:flex;align-items:center;gap:13px;width:100%;padding:13px 15px;
    background:var(--paper);color:var(--ink);text-decoration:none;
    font-family:var(--mono);font-size:1.4rem;line-height:1;letter-spacing:1px;
    box-shadow:0 0 0 var(--px) var(--ink), var(--px) var(--px) 0 0 var(--brass);
    transition:transform .1s,background .15s;
  }
  a.btn:active{transform:translate(2px,2px);box-shadow:0 0 0 var(--px) var(--ink);}
  a.btn:hover{background:#f8f1de;}
  .ico{width:30px;height:30px;flex:0 0 30px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;box-shadow:inset 0 0 0 2px rgba(0,0,0,.15);}
  .sp{background:#1DB954;} .am{background:#fb4c8a;} .kk{background:#0ec0c0;} .yt{background:#ff0033;}
  .go{margin-left:auto;font-family:var(--pixel-en);font-size:.5rem;color:var(--brass-deep);}
  .hint{margin-top:22px;font-family:var(--mono);font-size:1rem;color:var(--ink-mute);text-align:center;max-width:300px;line-height:1.2;}
  .foot{margin-top:22px;font-family:var(--pixel-en);font-size:.5rem;color:var(--ink-mute);letter-spacing:1px;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <span class="badge">♪ NOW STREAMING</span>
      <img class="cover" src="cover.jpg" alt="又要等到你喝醉之後才能說愛你 封面">
      <h1>又要等到你喝醉之後才能說愛你</h1>
      <div class="artist">陳則皞</div>
      <div class="tag">這次，我把它重新做了一遍。各平台串流上線。</div>

      <div class="links">
        <a class="btn" href="https://open.spotify.com/track/10HC8L6Wq5ZM6Opv714cv2" target="_blank" rel="noopener">
          <span class="ico sp">♪</span> Spotify <span class="go">PLAY ›</span>
        </a>
        <a class="btn" href="https://music.apple.com/tw/album/%E5%8F%88%E8%A6%81%E7%AD%89%E4%BD%A0%E5%96%9D%E9%86%89%E4%B9%8B%E5%BE%8C%E6%89%8D%E8%83%BD%E8%AA%AA%E6%84%9B%E4%BD%A0-single/6779588297" target="_blank" rel="noopener">
          <span class="ico am">⌘</span> Apple Music <span class="go">PLAY ›</span>
        </a>
        <a class="btn" href="https://kkbox.fm/Xz1XHUs" target="_blank" rel="noopener">
          <span class="ico kk">K</span> KKBOX <span class="go">PLAY ›</span>
        </a>
        <a class="btn" href="https://youtu.be/b2ttOss6-_4" target="_blank" rel="noopener">
          <span class="ico yt">▶</span> YouTube <span class="go">PLAY ›</span>
        </a>
      </div>

      <div class="hint">在 IG／FB 裡點開的話，按右上「⋯」→「在瀏覽器開啟」，才會直接跳到你的 app。</div>
    </div>
    <div class="foot">陳則皞 · 巷弄故事館</div>
  </div>
</body>
</html>
